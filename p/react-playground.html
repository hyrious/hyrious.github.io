<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React App</title>
    <script defer src="https://cdn.jsdelivr.net/npm/react/umd/react.development.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/react-dom/umd/react-dom.development.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <style>
        @import url("https://cdn.jsdelivr.net/npm/modern-normalize/modern-normalize.css");
        @import url("https://dev-cats.github.io/code-snippets/JetBrainsMono.css");
        html, body, .container { height: 100%; margin: 0; }
        .container {
            box-sizing: border-box;
            padding: .5rem;
            display: flex;
            flex-flow: column nowrap;
            transition: opacity .6s;
        }
        .editor, .result {
            flex: 1;
            border: 1px solid;
            padding: .5rem;
            position: relative;
        }
        .editor::before, .result::before {
            content: attr(class);
            position: absolute; right: .5rem;
            opacity: .4;
        }
        .action {
            position: absolute; right: .5rem;
            opacity: 0;
            background: white;
            text-decoration: underline;
            transition: opacity .2s;
            user-select: none;
            cursor: pointer;
            z-index: 2;
        }
        .action:hover {
            opacity: 1;
        }
        .editor {
            margin-bottom: .5rem;
            display: flex;
        }
        @media (min-width: 640px) {
            .container { flex-flow: row nowrap; }
            .editor { margin-bottom: 0; margin-right: .5rem; }
        }
        .editor textarea {
            flex: 1;
            border: 0;
            outline: 0;
            resize: none;
            font-family: ui-monospace, 'JetBrains Mono', Iosevka, SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
        }
        #loading {
            position: fixed; bottom: 0;
            margin: .5rem;
            border: 1px solid;
            padding: .5rem;
            background: white;
            z-index: 1;
        }
    </style>
</head>
<body>
    <p id="loading">Loading React, ReactDOM and Babel...</p>
    <div class="container" style="opacity: 0">
        <div class="editor"><textarea wrap="off">ReactDOM.render(
    &lt;h1>hello, world&lt;/h1>,
    document.getElementById('root')
);
</textarea>
        <span id="copy" class="action">copy permanent link</span></div>
        <div id="root" class="result"></div>
    </div>
    <script type="text/babel">
        const loading = document.getElementById('loading');
        loading.style.display = 'none';
        let toastTimeout;
        function toast(message) {
            loading.textContent = message;
            loading.style.display = 'block';
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => loading.style.display = 'none', 2000);
        }
        const textarea = document.querySelector('textarea');
        const content = [...new URLSearchParams(location.search).keys()][0];
        if (content) textarea.value = content;
        document.querySelector('.container').style.opacity = 1;
        function debounce(fn, ms = 0) {
          let timeoutId;
          return (...args) => {
            clearTimeout(timeoutId);
            timeoutId = setTimeout(() => fn(...args), ms);
          };
        }
        function update() {
            const config = { presets: ['env', 'react'] };
            try {
                const code = Babel.transform(textarea.value, config).code;
                Function(code)();
            } catch (e) {
                console.debug(e);
            }
        }
        textarea.addEventListener('input', debounce(update, 400));
        textarea.addEventListener('dragstart', e => e.preventDefault());
        update();
        function onPressTab(e) {
            if (e.keyCode === 9 && typeof textarea.selectionStart !== 'undefined') {
                const startPosition = textarea.selectionStart;
                const endPosition = textarea.selectionEnd;
                textarea.value = textarea.value.substring(0, startPosition) +
                                 '    ' +
                                 textarea.value.substring(endPosition);
                textarea.selectionStart = textarea.selectionEnd = startPosition + 4;
                e.preventDefault();
            }
        }
        textarea.addEventListener('keydown', onPressTab);
        function copyPermanentLink() {
            history.pushState(null, '', '?' + encodeURIComponent(textarea.value));
            try {
                navigator.clipboard.writeText(location.href);
                toast('Copy done!')
            } catch {
                window.alert("Failed to copy, help yourself! -- see address bar")
            }
        }
        document.getElementById('copy').addEventListener('click', copyPermanentLink);
    </script>
</body>
</html>
